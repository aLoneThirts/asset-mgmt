services:
  - type: web
    name: asset-mgmt-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ALLOWED_ORIGINS
        value: https://asset-mgmt.vercel.app,http://localhost:5173
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false   # Render dashboard'dan manuel girilecek
